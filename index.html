<!DOCTYPE html>
<html>
<head>
    <title>Chess Home UI</title>
    <link rel="stylesheet" href="chess.css">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h2>Chess.com</h2>
        <a href="#" class="btn">Sign Up</a>
    </div>

    <!-- Cards Section -->
    <div class="container">

        <div class="card">
            <img src="https://via.placeholder.com/80" alt="board">
            <div>
                <h3>Play Online</h3>
                <p>Play someone at your level!</p>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/80" alt="puzzle">
            <div>
                <h3>Solve Puzzles</h3>
                <p>Find the right move!</p>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/80" alt="bot">
            <div>
                <h3>Play Bots</h3>
                <p>Jimmy – Friendly</p>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/80" alt="coach">
            <div>
                <h3>Play Coach</h3>
                <p>Coach David</p>
            </div>
        </div>

    </div>

    <!-- Play Button -->
    <button class="play-btn">Play</button>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div>Home</div>
        <div>Puzzles</div>
        <div>Learn</div>
        <div>Watch</div>
        <div>More</div>
    </div>

</body>
</html>
